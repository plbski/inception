services:

  nginx:
    build: requirements/nginx
    container_name: nginx
    restart: always
    ports:
      - "443:443"
    volumes:
      - wordpress_data:/var/www/html/wordpress
    networks:
      - inception_network
    depends_on:
      wordpress:
        condition: service_healthy

  wordpress:
    build: requirements/wordpress
    container_name: wordpress
    restart: always
    env_file: .env
    volumes:
      - wordpress_data:/var/www/html/wordpress
    networks:
      - inception_network
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php-fpm8.2", "-t"]
      interval: 10s
      timeout: 5s
      retries: 5

  mariadb:
    build: requirements/mariadb
    container_name: mariadb
    restart: always
    env_file: .env
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}", "--silent"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  wordpress_data:
    driver: local

  mariadb_data:
    driver: local

networks:
  inception_network:
    driver: bridge
